name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master, release/**]

jobs:
  # ── Backend tests ─────────────────────────────────────────────────────────
  backend-tests:
    name: Django Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: SemirDashboard
        run: python manage.py test tests -v 2
        env:
          SECRET_KEY: ci-test-secret-key
          DEBUG: 'True'
          ALLOWED_HOSTS: localhost

  # ── Flutter tests ─────────────────────────────────────────────────────────
  flutter-tests:
    name: Flutter Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - name: Get dependencies
        working-directory: semir-phone
        run: flutter pub get
      - name: Analyze
        working-directory: semir-phone
        run: flutter analyze
      - name: Run tests
        working-directory: semir-phone
        run: flutter test
